<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StreetPolylineMaker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="appShell" class="app-shell">
    <aside class="sidebar" aria-label="Operacoes">
      <div class="sidebar-header">
        <div>
          <p class="eyebrow">Geo tooling</p>
          <h1>StreetPolylineMaker</h1>
        </div>
        <button id="toggleSidebar" class="icon-btn" type="button" title="Minimizar painel" aria-label="Minimizar painel">&lsaquo;</button>
      </div>

      <div class="sidebar-content">
        <section class="panel">
          <h2>Google Maps</h2>
          <label class="field">
            <span>API key</span>
            <input id="apiKey" type="password" placeholder="Chave da API do Google Maps">
          </label>
          <div class="row">
            <button id="saveApiKey" class="btn btn-secondary" type="button">Salvar</button>
            <button id="loadMap" class="btn btn-primary" type="button">Carregar mapa</button>
          </div>
          <p id="mapStatus" class="hint">Informe a chave para carregar o mapa.</p>
        </section>

        <section class="panel">
          <h2>Operacoes</h2>
          <div class="stack">
            <button id="exportData" class="btn btn-primary" type="button">Exportar SQL + JSON</button>
            <button id="openImportModal" class="btn btn-secondary" type="button">Importar JSON</button>
            <button id="loadHistory" class="btn btn-secondary" type="button">Carregar historico salvo</button>
            <button id="toggleImported" class="btn btn-secondary" type="button">Mostrar/ocultar importados</button>
            <button id="clearAll" class="btn btn-danger" type="button">Limpar tudo</button>
          </div>
        </section>
      </div>
    </aside>

    <main class="workspace">
      <nav class="config-bar" aria-label="Configuracao">
        <label class="compact-field">
          <span>Rodovia</span>
          <input id="roadName" type="text" placeholder="BR-116">
        </label>
        <label class="compact-field compact-field-small">
          <span>Sentido</span>
          <select id="direction">
            <option value="N">Norte</option>
            <option value="S">Sul</option>
            <option value="L">Leste</option>
            <option value="O">Oeste</option>
          </select>
        </label>
        <label class="compact-field compact-field-small">
          <span>KM</span>
          <input id="startKm" type="number" step="0.001" value="0">
        </label>
        <label class="compact-field">
          <span>Nome</span>
          <input id="displayName" type="text" placeholder="Descricao">
        </label>
        <label class="compact-field compact-field-small">
          <span>Raio (m)</span>
          <input id="defaultRadius" type="number" step="1" value="500">
        </label>
        <label class="compact-field compact-field-small">
          <span>Passo (km)</span>
          <input id="exportStepKm" type="number" step="0.001" value="0.1">
        </label>
      </nav>

      <section class="map-panel">
        <div class="map-toolbar">
          <div>
            <p class="toolbar-label">Resumo</p>
            <p id="summaryText" class="toolbar-value">Nenhum ponto marcado.</p>
          </div>
          <div class="metrics">
            <div class="metric">
              <span class="metric-label">Distancia cursor</span>
              <strong id="cursorDistance">0 m</strong>
            </div>
            <div class="metric">
              <span class="metric-label">Proximo KM</span>
              <strong id="nextKm">0.000</strong>
            </div>
          </div>
        </div>
        <div id="map" class="map-canvas" aria-label="Mapa"></div>
      </section>
    </main>
  </div>

  <dialog id="exportModal" class="modal modal-wide">
    <div class="modal-header">
      <h2>Exportacao</h2>
      <button id="closeExportModal" class="icon-btn" type="button" title="Fechar" aria-label="Fechar">&times;</button>
    </div>
    <div class="modal-grid">
      <article class="modal-panel">
        <div class="panel-header">
          <h3>SQL</h3>
          <button id="copySql" class="btn btn-ghost" type="button">Copiar</button>
        </div>
        <textarea id="sqlOutput" rows="18" spellcheck="false" placeholder="O SQL exportado aparecera aqui."></textarea>
      </article>
      <article class="modal-panel">
        <div class="panel-header">
          <h3>JSON</h3>
          <button id="copyJson" class="btn btn-ghost" type="button">Copiar</button>
        </div>
        <textarea id="jsonOutput" rows="18" spellcheck="false" placeholder="O JSON exportado aparecera aqui."></textarea>
      </article>
    </div>
  </dialog>

  <dialog id="importModal" class="modal">
    <div class="modal-header">
      <h2>Importar JSON</h2>
      <button id="closeImportModal" class="icon-btn" type="button" title="Fechar" aria-label="Fechar">&times;</button>
    </div>
    <label class="field">
      <span>Arquivo</span>
      <input id="importFile" type="file" accept=".json,application/json">
    </label>
    <label class="field">
      <span>Ou cole o JSON</span>
      <textarea id="importText" rows="12" placeholder='{"version":1,"anchors":[...]} ou [{"longitude":...}]'></textarea>
    </label>
    <div class="row">
      <button id="importJson" class="btn btn-secondary" type="button">Importar e exibir</button>
      <button id="useJsonAsHistory" class="btn btn-primary" type="button">Importar como edicao</button>
    </div>
  </dialog>

  <script src="./app.js"></script>
</body>
</html>
